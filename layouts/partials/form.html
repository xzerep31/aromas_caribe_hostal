<div class="hotel_booking_area position">
    <div class="container">
        <div class="hotel_booking_table">
            <div class="col-md-3">
                <h2>{{ i18n "book" }}<br> {{ i18n "yourroom" }}</h2>
            </div>
            <div class="col-md-9">
                <div class="boking_table">
                    <form action="{{ .Site.Params.formsubmit_action }}" method="post">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="book_tabel_item">
                                <div class="form-group">
                                    <div class='input-group date' id='datetimepicker11'>
                                        <input type='text' class="form-control" placeholder="{{ i18n "arrivalDate"}}"/>
                                        <span class="input-group-addon">
                                            <i class="fa fa-calendar" aria-hidden="true"></i>
                                        </span>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <div class='input-group date' id='datetimepicker1'>
                                        <input type='text' class="form-control" placeholder="{{ i18n "departureDate"}}"/>
                                        <span class="input-group-addon">
                                            <i class="fa fa-calendar" aria-hidden="true"></i>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="book_tabel_item">
                                <div class="input-group">
                                    <select class="wide">
                                        <option data-display="{{ i18n "adult"}}">{{ i18n "adult"}}</option>
                                        <option value="1">{{ i18n "old"}}</option>
                                        <option value="2">{{ i18n "younger"}}</option>
                                    </select>
                                </div>
                                <div class="input-group">
                                    <select class="wide">
                                        <option data-display="{{ i18n "child"}}">{{ i18n "child"}}</option>
                                        <option value="1">{{ i18n "child"}}</option>
                                        <option value="2">{{ i18n "baby"}}</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="book_tabel_item">
                                <div class="input-group">
                                    <select class="wide">
                                        <option data-display="{{ i18n "numberof"}} {{ i18n "rooms" }}">{{ i18n "numberof"}} {{ i18n "rooms" }}</option>
                                        <option value="1">{{ i18n "room"}} 01</option>
                                        <option value="2">{{ i18n "room"}} 02</option>
                                    </select>
                                </div>
                                <button class="book_now_btn button_hover" type="submit">{{ i18n "book"}} {{ i18n "now" }}</button>
                            </div>
                        </div>
                    </div>
                </form>
                </div>
            </div>
        </div>
    </div>
</div>
