baseURL = 'https://hostalaromasdelcaribe.trinicuba.com/'
languageCode = 'en-us'
title = 'Hostal Aromas del Caribe'
defaultContentLanguage = 'es'
defaultContentLanguageInSubdir = true
paginate = 20
canonifyUrls = true


[params]
    defaultDescription = ""
    defaultKeywords = ["Hostal", "Aromas del Caribe", "Hostel", "Cuba", "Trinidad", "Caribe"]
    
    info = ""

    hidecredits = false
    hidecopyright = false

    rtl = false

    math = true

    phone  = "(+53) 5 522-7984"
    email = ""

    formsubmit_action = "https://formsubmit.co/"

    css = ["css/bootstrap.css",
           "vendors/linericon/style.css",
           "css/font-awesome.min.css",
           "vendors/owl-carousel/owl.carousel.min.css",
           "vendors/bootstrap-datepicker/bootstrap-datetimepicker.min.css",
           "vendors/nice-select/css/nice-select.css",
           "vendors/owl-carousel/owl.carousel.min.css",
           "css/style.css",
           "css/responsive.css"
          ]

    js = ["js/jquery-3.2.1.min.js",
          "js/popper.js",
          "js/bootstrap.min.js",
          "vendors/owl-carousel/owl.carousel.min.js",
          "js/jquery.ajaxchimp.min.js",
          "js/mail-script.js",
          "vendors/bootstrap-datepicker/bootstrap-datetimepicker.min.js",
          "vendors/nice-select/js/jquery.nice-select.js",
          "js/mail-script.js",
          "js/stellar.js",
          "vendors/lightbox/simpleLightbox.min.js",
          "js/custom.js"
         ]

[Author]
    name = "Pedro Victor Navarrete Alejo"

[languages]
    [languages.es]
        contentDir = 'content/es'
        languageName = "Es"
        weight = 1
        [languages.es.params]
            flag = 'fi fi-es fis'

    [languages.en]
       contentDir = 'content/en'
       languageName = "En"
       weight = 2
       [languages.en.params]
            flag = 'fi fi-sh fis'

    [languages.fr]
       contentDir = 'content/fr'
       languageName = "Fr"
       weight = 3
       [languages.fr.params]
            flag = 'fi fi-fr fis'


# Social links
[[params.social]]
    name = "Facebook"
    icon = "fab fa-facebook"
    weight = 1
    url = "https://www.facebook.com/"
[[params.social]]
    name = "Instagram"
    icon = "fab fa-instagram"
    weight = 2
    url = "https://www.instagram.com/"
[[params.social]]
    name = "Gmail"
    icon = "fa fa-envelope"
    weight = 3
    url = "mailto:"

